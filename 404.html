<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, follow" />
  <link rel="canonical" href="https://www.realhenryyue.com/" />
  <meta http-equiv="refresh" content="0; url=/" />
  <title>Redirecting...</title>
  <script>
    (function() {
      // Get the current full path excluding domain and protocol
      var path = window.location.pathname || '/';
      var search = window.location.search || '';
      var hash = window.location.hash || '';

      var sectionMap = {
        '/investment-analysis': '/#investment-analysis',
        '/queens-real-estate': '/#queens-real-estate',
        '/manhattan-properties': '/#manhattan-properties',
        '/roi-calculator': '/#roi-calculator',
        '/contact': '/#contact',
        '/blog': '/#blog'
      };

      var normalizedPath = path.replace(/^\/en/, '').replace(/^\/zh/, '') || '/';
      var redirectUrl = sectionMap[normalizedPath] || '/';

      // Redirect immediately
      window.location.replace(redirectUrl);
    })();
  </script>
</head>
<body>
  <p>Redirecting to the homepage...</p>
</body>
</html>
